<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#070a12">
    <title>{{ TITLE }}</title>
    <link rel="icon" href="{{ ROOT }}images/my-image.jpg" type="image/jpeg">
    <link rel="canonical" href="{{ CANONICAL_URL }}">
    <meta name="description" content="{{ DESCRIPTION }}">
    <meta name="keywords" content="Raj Kishor Mahapatra, RK Mahapatra, itsrkmahapatra, @itsrkmahapatra, Author, Developer, AI Strategist, Prompt Engineering, Zero Trust Cybersecurity, WebCrypto, Odisha Heritage, Chikiti Ganjam">
    <meta name="author" content="Raj Kishor Mahapatra">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
    
    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="{{ OG_TYPE }}">
    <meta property="og:url" content="{{ CANONICAL_URL }}">
    <meta property="og:title" content="{{ TITLE }}">
    <meta property="og:description" content="{{ DESCRIPTION }}">
    <meta property="og:image" content="https://itsrkmahapatra.qzz.io/images/my-image.jpg">
    <meta property="og:site_name" content="Raj Kishor Mahapatra | Official Website">
    
    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="{{ CANONICAL_URL }}">
    <meta name="twitter:title" content="{{ TITLE }}">
    <meta name="twitter:description" content="{{ DESCRIPTION }}">
    <meta name="twitter:image" content="https://itsrkmahapatra.qzz.io/images/my-image.jpg">

    <!-- Linked JSON-LD Knowledge Graph -->
    <script type="application/ld+json">
{{ SCHEMA_JSON }}
    </script>

    <script>
      (function() {
        const _warn = console.warn;
        const _error = console.error;
        console.warn = function(...args) {
          if (args[0] && typeof args[0] === 'string' && (args[0].includes('cdn.tailwindcss.com should not be used in production') || args[0].includes("'file:' URLs are treated as unique security origins") || args[0].includes("Unsafe attempt to load URL file:"))) return;
          _warn.apply(console, args);
        };
        console.error = function(...args) {
          if (args[0] && typeof args[0] === 'string' && (args[0].includes("'file:' URLs are treated as unique security origins") || args[0].includes("Unsafe attempt to load URL file:"))) return;
          _error.apply(console, args);
        };
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ ROOT }}css/style.css">
</head>
<body class="min-h-screen flex flex-col pt-24">
    {{ HEADER }}

    {{ CONTENT }}

    {{ FOOTER }}

    <script src="{{ ROOT }}js/core.js" defer></script>
    {{ EXTRA_SCRIPTS }}
</body>
</html>
